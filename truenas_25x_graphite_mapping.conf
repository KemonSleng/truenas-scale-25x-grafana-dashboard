mappings:
# =============================================================================
# TrueNAS SCALE 25.x — Graphite to Prometheus Mapping File
# =============================================================================
# Compatible with: TrueNAS SCALE 25.04, 25.10.x (Goldeye)
# Version:         3 (container label, disk_busy fix, cgroup prefix strip)
# Tested on:       TrueNAS SCALE 25.10.2.1
#
# SETUP:
#   In TrueNAS → Reporting → Exporters → Add:
#     Type:                 GRAPHITE
#     Destination IP:       <your graphite-exporter IP>
#     Destination Port:     9109
#     Prefix:               (leave blank)
#     Namespace:            truenas
#     Send Names Instead Of IDs: enabled
#
#   TrueNAS 25.x hardcodes a "scale." prefix regardless of settings.
#   Leaving Prefix blank + Namespace "truenas" produces:
#     scale.truenas.<chart>.<dimension>
#   which is exactly what this mapping file expects.
#
# IMPORTANT — graphite-exporter must be started with:
#   --graphite.sample-expiry=60m
#
#   TrueNAS 25.x sends slower metrics (disk temps, pool usage) with
#   timestamps that are already 10-15 minutes old by the time they
#   arrive. The default 5m sample expiry silently drops these metrics.
#   Setting 60m ensures all metrics are retained between collection cycles.
#
#   Example docker-compose command:
#     command: >
#       --graphite.mapping-config=/tmp/graphite_mapping.conf
#       --graphite.sample-expiry=60m
#
# METRICS COVERED (63 unique Prometheus metric names):
#   CPU:       truenas_cpu_usage, truenas_cpu_temperature
#   Memory:    truenas_memory
#   System:    truenas_load, truenas_uptime_seconds, truenas_active_processes,
#              truenas_clock_*, truenas_system_net
#   Network:   truenas_interface_io/speed/duplex/operstate/carrier/mtu/drops/packets
#   NFS:       truenas_nfs_io/rpc/threads/net/readcache/filehandles/proc4/proc4ops
#   Pool:      truenas_pool_usage
#   ARC:       truenas_arc_size/free/available/l2/demand_data/demand_metadata
#   Disk:      truenas_disk_io/busy/ops/temperature
#   Services:  truenas_service_cpu/memory/io/iops
#   Cgroups:   truenas_cgroup_cpu/memory/io/* (matches any cgroup_* container)
# =============================================================================

# -----------------------------------------------------------------------------
# CPU USAGE — per core
# Labels: cpu (cpu, cpu0-cpu15)  |  Unit: percent
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.truenas_cpu_usage\.cpu\.(.*)'
  match_type: regex
  name: truenas_cpu_usage
  labels:
    job: truenas
    cpu: "${1}"

# -----------------------------------------------------------------------------
# CPU TEMPERATURE — per core
# Labels: core (cpu, cpu0-cpu15)  |  Unit: celsius
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.cputemp\.temperatures\.(.*)'
  match_type: regex
  name: truenas_cpu_temperature
  labels:
    job: truenas
    core: "${1}"

# -----------------------------------------------------------------------------
# MEMORY
# Labels: type (total, available)  |  Unit: bytes
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.truenas_meminfo\.(.*)\.(.*)'
  match_type: regex
  name: truenas_memory
  labels:
    job: truenas
    type: "${1}"

# -----------------------------------------------------------------------------
# SYSTEM — LOAD AVERAGE
# Labels: period (load1, load5, load15)
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.system\.load\.(.*)'
  match_type: regex
  name: truenas_load
  labels:
    job: truenas
    period: "${1}"

# -----------------------------------------------------------------------------
# SYSTEM — UPTIME
# Unit: seconds
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.system\.uptime\.uptime'
  match_type: regex
  name: truenas_uptime_seconds
  labels:
    job: truenas

# -----------------------------------------------------------------------------
# SYSTEM — ACTIVE PROCESSES
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.system\.active_processes\.active'
  match_type: regex
  name: truenas_active_processes
  labels:
    job: truenas

# -----------------------------------------------------------------------------
# SYSTEM — CLOCK SYNC
# Labels: type (clockerr, unsync)
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.system\.clock_status\.(.*)'
  match_type: regex
  name: truenas_clock_status
  labels:
    job: truenas
    type: "${1}"

- match: 'scale\.truenas\.system\.clock_sync_offset\.offset'
  match_type: regex
  name: truenas_clock_sync_offset
  labels:
    job: truenas

- match: 'scale\.truenas\.system\.clock_sync_state\.state'
  match_type: regex
  name: truenas_clock_sync_state
  labels:
    job: truenas

# -----------------------------------------------------------------------------
# SYSTEM — TOTAL NETWORK I/O (all interfaces combined)
# Labels: direction (received, sent)  |  Unit: kilobits/s
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.system\.net\.(.*)'
  match_type: regex
  name: truenas_system_net
  labels:
    job: truenas
    direction: "${1}"

# -----------------------------------------------------------------------------
# NETWORK — PER INTERFACE I/O
# Labels: interface (e.g. enp5s0, eth0, eno1, etc), direction (received, sent)
# Unit: kilobits/s
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.net\.(.*)\.received'
  match_type: regex
  name: truenas_interface_io
  labels:
    job: truenas
    interface: "${1}"
    direction: "received"

- match: 'scale\.truenas\.net\.(.*)\.sent'
  match_type: regex
  name: truenas_interface_io
  labels:
    job: truenas
    interface: "${1}"
    direction: "sent"

# -----------------------------------------------------------------------------
# NETWORK — INTERFACE SPEED
# Labels: interface  |  Unit: bits/s
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.net_speed\.(.*)\.speed'
  match_type: regex
  name: truenas_interface_speed
  labels:
    job: truenas
    interface: "${1}"

# -----------------------------------------------------------------------------
# NETWORK — INTERFACE DUPLEX
# Labels: interface, state (full, half, unknown)
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.net_duplex\.(.*)\.(.*)'
  match_type: regex
  name: truenas_interface_duplex
  labels:
    job: truenas
    interface: "${1}"
    state: "${2}"

# -----------------------------------------------------------------------------
# NETWORK — INTERFACE OPERATIONAL STATE
# Labels: interface, state (up, down, notpresent, etc)
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.net_operstate\.(.*)\.(.*)'
  match_type: regex
  name: truenas_interface_operstate
  labels:
    job: truenas
    interface: "${1}"
    state: "${2}"

# -----------------------------------------------------------------------------
# NETWORK — INTERFACE CARRIER STATE
# Labels: interface, state
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.net_carrier\.(.*)\.(.*)'
  match_type: regex
  name: truenas_interface_carrier
  labels:
    job: truenas
    interface: "${1}"
    state: "${2}"

# -----------------------------------------------------------------------------
# NETWORK — INTERFACE MTU
# Labels: interface  |  Unit: bytes
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.net_mtu\.(.*)\.mtu'
  match_type: regex
  name: truenas_interface_mtu
  labels:
    job: truenas
    interface: "${1}"

# -----------------------------------------------------------------------------
# NETWORK — INTERFACE PACKET DROPS
# Labels: interface, direction (inbound, outbound)
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.net_drops\.(.*)\.(.*)'
  match_type: regex
  name: truenas_interface_drops
  labels:
    job: truenas
    interface: "${1}"
    direction: "${2}"

# -----------------------------------------------------------------------------
# NETWORK — INTERFACE PACKETS
# Labels: interface, type (received, sent, multicast, etc)
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.net_packets\.(.*)\.(.*)'
  match_type: regex
  name: truenas_interface_packets
  labels:
    job: truenas
    interface: "${1}"
    type: "${2}"

# -----------------------------------------------------------------------------
# NFS SERVER — I/O
# Labels: operation (read, write)  |  Unit: kilobytes/s
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.nfsd\.io\.(.*)'
  match_type: regex
  name: truenas_nfs_io
  labels:
    job: truenas
    operation: "${1}"

# -----------------------------------------------------------------------------
# NFS SERVER — RPC CALLS
# Labels: type (calls, bad_auth, bad_format)
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.nfsd\.rpc\.(.*)'
  match_type: regex
  name: truenas_nfs_rpc
  labels:
    job: truenas
    type: "${1}"

# -----------------------------------------------------------------------------
# NFS SERVER — THREADS
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.nfsd\.threads\.threads'
  match_type: regex
  name: truenas_nfs_threads
  labels:
    job: truenas

# -----------------------------------------------------------------------------
# NFS SERVER — NETWORK
# Labels: protocol (tcp, udp)
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.nfsd\.net\.(.*)'
  match_type: regex
  name: truenas_nfs_net
  labels:
    job: truenas
    protocol: "${1}"

# -----------------------------------------------------------------------------
# NFS SERVER — READ CACHE
# Labels: type (hits, misses, nocache)
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.nfsd\.readcache\.(.*)'
  match_type: regex
  name: truenas_nfs_readcache
  labels:
    job: truenas
    type: "${1}"

# -----------------------------------------------------------------------------
# NFS SERVER — FILE HANDLES
# Labels: type (stale)
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.nfsd\.filehandles\.(.*)'
  match_type: regex
  name: truenas_nfs_filehandles
  labels:
    job: truenas
    type: "${1}"

# -----------------------------------------------------------------------------
# NFS SERVER — NFSv4 PROCEDURE COUNTS
# Labels: procedure (null, read)
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.nfsd\.proc4\.(.*)'
  match_type: regex
  name: truenas_nfs_proc4
  labels:
    job: truenas
    procedure: "${1}"

# -----------------------------------------------------------------------------
# NFS SERVER — NFSv4 OPERATION COUNTS
# Labels: operation (access, read, write, open, close, lookup, etc)
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.nfsd\.proc4ops\.(.*)'
  match_type: regex
  name: truenas_nfs_proc4ops
  labels:
    job: truenas
    operation: "${1}"

# -----------------------------------------------------------------------------
# ZFS POOL USAGE
# Labels: type (available, total, used)  |  Unit: bytes
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.truenas_pool\.usage\.(.*)'
  match_type: regex
  name: truenas_pool_usage
  labels:
    job: truenas
    type: "${1}"

# -----------------------------------------------------------------------------
# ZFS ARC — SIZE
# Unit: bytes
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.truenas_arcstats\.size\.size'
  match_type: regex
  name: truenas_arc_size
  labels:
    job: truenas

- match: 'scale\.truenas\.truenas_arcstats\.free\.free'
  match_type: regex
  name: truenas_arc_free
  labels:
    job: truenas

- match: 'scale\.truenas\.truenas_arcstats\.avail\.avail'
  match_type: regex
  name: truenas_arc_available
  labels:
    job: truenas

# -----------------------------------------------------------------------------
# ZFS ARC — L2ARC (SSD cache layer)
# Labels: type (bytes, hits, misses, reads, write_bytes)
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.truenas_arcstats\.l2bytes\.l2bytes'
  match_type: regex
  name: truenas_arc_l2
  labels:
    job: truenas
    type: "bytes"

- match: 'scale\.truenas\.truenas_arcstats\.l2hits\.l2hits'
  match_type: regex
  name: truenas_arc_l2
  labels:
    job: truenas
    type: "hits"

- match: 'scale\.truenas\.truenas_arcstats\.l2miss\.l2miss'
  match_type: regex
  name: truenas_arc_l2
  labels:
    job: truenas
    type: "misses"

- match: 'scale\.truenas\.truenas_arcstats\.l2read\.l2read'
  match_type: regex
  name: truenas_arc_l2
  labels:
    job: truenas
    type: "reads"

- match: 'scale\.truenas\.truenas_arcstats\.l2wbytes\.l2wbytes'
  match_type: regex
  name: truenas_arc_l2
  labels:
    job: truenas
    type: "write_bytes"

- match: 'scale\.truenas\.truenas_arcstats\.l2hit_p\.l2hit'
  match_type: regex
  name: truenas_arc_l2_hit_percent
  labels:
    job: truenas

- match: 'scale\.truenas\.truenas_arcstats\.l2miss_p\.l2miss'
  match_type: regex
  name: truenas_arc_l2_miss_percent
  labels:
    job: truenas

# -----------------------------------------------------------------------------
# ZFS ARC — DEMAND DATA HIT/MISS
# Labels: type (hits, misses, iohits, reads)
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.truenas_arcstats\.ddhit\.ddhit'
  match_type: regex
  name: truenas_arc_demand_data
  labels:
    job: truenas
    type: "hits"

- match: 'scale\.truenas\.truenas_arcstats\.ddmis\.ddmis'
  match_type: regex
  name: truenas_arc_demand_data
  labels:
    job: truenas
    type: "misses"

- match: 'scale\.truenas\.truenas_arcstats\.ddioh\.ddioh'
  match_type: regex
  name: truenas_arc_demand_data
  labels:
    job: truenas
    type: "iohits"

- match: 'scale\.truenas\.truenas_arcstats\.ddread\.ddread'
  match_type: regex
  name: truenas_arc_demand_data
  labels:
    job: truenas
    type: "reads"

- match: 'scale\.truenas\.truenas_arcstats\.ddh_p\.ddh'
  match_type: regex
  name: truenas_arc_demand_data_hit_percent
  labels:
    job: truenas

- match: 'scale\.truenas\.truenas_arcstats\.ddm_p\.ddm'
  match_type: regex
  name: truenas_arc_demand_data_miss_percent
  labels:
    job: truenas

- match: 'scale\.truenas\.truenas_arcstats\.ddi_p\.ddi'
  match_type: regex
  name: truenas_arc_demand_data_iohit_percent
  labels:
    job: truenas

# -----------------------------------------------------------------------------
# ZFS ARC — DEMAND METADATA HIT/MISS
# Labels: type (hits, misses, iohits, reads)
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.truenas_arcstats\.dmhit\.dmhit'
  match_type: regex
  name: truenas_arc_demand_metadata
  labels:
    job: truenas
    type: "hits"

- match: 'scale\.truenas\.truenas_arcstats\.dmmis\.dmmis'
  match_type: regex
  name: truenas_arc_demand_metadata
  labels:
    job: truenas
    type: "misses"

- match: 'scale\.truenas\.truenas_arcstats\.dmioh\.dmioh'
  match_type: regex
  name: truenas_arc_demand_metadata
  labels:
    job: truenas
    type: "iohits"

- match: 'scale\.truenas\.truenas_arcstats\.dmread\.dmread'
  match_type: regex
  name: truenas_arc_demand_metadata
  labels:
    job: truenas
    type: "reads"

- match: 'scale\.truenas\.truenas_arcstats\.dmh_p\.dmh'
  match_type: regex
  name: truenas_arc_demand_metadata_hit_percent
  labels:
    job: truenas

- match: 'scale\.truenas\.truenas_arcstats\.dmm_p\.dmm'
  match_type: regex
  name: truenas_arc_demand_metadata_miss_percent
  labels:
    job: truenas

- match: 'scale\.truenas\.truenas_arcstats\.dmi_p\.dmi'
  match_type: regex
  name: truenas_arc_demand_metadata_iohit_percent
  labels:
    job: truenas

# -----------------------------------------------------------------------------
# ZFS ARC — TOTAL DEMAND READS
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.truenas_arcstats\.dread\.dread'
  match_type: regex
  name: truenas_arc_demand_reads_total
  labels:
    job: truenas

# -----------------------------------------------------------------------------
# DISK STATS — THROUGHPUT
# Labels: disk (serial number), operation (reads, writes)  |  Unit: kilobytes/s
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.truenas_disk_stats\.(.*)\.reads'
  match_type: regex
  name: truenas_disk_io
  labels:
    job: truenas
    disk: "${1}"
    operation: "reads"

- match: 'scale\.truenas\.truenas_disk_stats\.(.*)\.writes'
  match_type: regex
  name: truenas_disk_io
  labels:
    job: truenas
    disk: "${1}"
    operation: "writes"

# -----------------------------------------------------------------------------
# DISK STATS — BUSY
# Labels: disk (serial number)  |  Unit: percent
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.truenas_disk_stats\.busy\.([^.]*)\..*'
  match_type: regex
  name: truenas_disk_busy
  labels:
    job: truenas
    disk: "${1}"

# -----------------------------------------------------------------------------
# DISK STATS — IOPS
# Labels: disk (serial number), operation (read, write)  |  Unit: ops/s
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.truenas_disk_stats\.ops\.(.*)\.read_ops'
  match_type: regex
  name: truenas_disk_ops
  labels:
    job: truenas
    disk: "${1}"
    operation: "read"

- match: 'scale\.truenas\.truenas_disk_stats\.ops\.(.*)\.write_ops'
  match_type: regex
  name: truenas_disk_ops
  labels:
    job: truenas
    disk: "${1}"
    operation: "write"

# -----------------------------------------------------------------------------
# DISK TEMPERATURE
# Labels: disk (serial number)  |  Unit: celsius
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.truenas_disk_temp\.(.*)\.temp'
  match_type: regex
  name: truenas_disk_temperature
  labels:
    job: truenas
    disk: "${1}"

# -----------------------------------------------------------------------------
# SERVICES — CPU, MEMORY, I/O PER SYSTEM SERVICE
# Labels: service (middlewared, nginx, smbd, nfs_mountd, etc)
# Unit: cpu=percent, memory=megabytes, io=kilobytes/s, iops=ops/s
# -----------------------------------------------------------------------------
- match: 'scale\.truenas\.services\.cpu\.(.*)'
  match_type: regex
  name: truenas_service_cpu
  labels:
    job: truenas
    service: "${1}"

- match: 'scale\.truenas\.services\.mem_usage\.(.*)'
  match_type: regex
  name: truenas_service_memory
  labels:
    job: truenas
    service: "${1}"

- match: 'scale\.truenas\.services\.io_read\.(.*)'
  match_type: regex
  name: truenas_service_io
  labels:
    job: truenas
    service: "${1}"
    direction: "read"

- match: 'scale\.truenas\.services\.io_write\.(.*)'
  match_type: regex
  name: truenas_service_io
  labels:
    job: truenas
    service: "${1}"
    direction: "write"

- match: 'scale\.truenas\.services\.io_ops_read\.(.*)'
  match_type: regex
  name: truenas_service_iops
  labels:
    job: truenas
    service: "${1}"
    direction: "read"

- match: 'scale\.truenas\.services\.io_ops_write\.(.*)'
  match_type: regex
  name: truenas_service_iops
  labels:
    job: truenas
    service: "${1}"
    direction: "write"

# -----------------------------------------------------------------------------
# CGROUP RESOURCE USAGE
# Matches any cgroup_* container automatically (e.g. pbs, nextcloud, jellyfin, etc)
# The container name is extracted as a label — no changes needed for new containers
# Unit: cpu=percent, memory=bytes, io=bytes/s
# -----------------------------------------------------------------------------

# CPU
- match: 'scale\.truenas\.(cgroup_[^.]*)\.cpu\.(.*)'
  match_type: regex
  name: truenas_cgroup_cpu
  labels:
    job: truenas
    container: "${1}"
    type: "${2}"

- match: 'scale\.truenas\.(cgroup_[^.]*)\.cpu_limit\.used'
  match_type: regex
  name: truenas_cgroup_cpu_limit
  labels:
    job: truenas
    container: "${1}"

- match: 'scale\.truenas\.(cgroup_[^.]*)\.throttled\.throttled'
  match_type: regex
  name: truenas_cgroup_cpu_throttled
  labels:
    job: truenas
    container: "${1}"

- match: 'scale\.truenas\.(cgroup_[^.]*)\.throttled_duration\.duration'
  match_type: regex
  name: truenas_cgroup_cpu_throttled_duration
  labels:
    job: truenas
    container: "${1}"

- match: 'scale\.truenas\.(cgroup_[^.]*)\.cpu_full_pressure\.(.*)'
  match_type: regex
  name: truenas_cgroup_cpu_pressure
  labels:
    job: truenas
    container: "${1}"
    type: "full"
    period: "${2}"

- match: 'scale\.truenas\.(cgroup_[^.]*)\.cpu_some_pressure\.(.*)'
  match_type: regex
  name: truenas_cgroup_cpu_pressure
  labels:
    job: truenas
    container: "${1}"
    type: "some"
    period: "${2}"

- match: 'scale\.truenas\.(cgroup_[^.]*)\.cpu_full_pressure_stall_time\.time'
  match_type: regex
  name: truenas_cgroup_cpu_pressure_stall_time
  labels:
    job: truenas
    container: "${1}"
    type: "full"

- match: 'scale\.truenas\.(cgroup_[^.]*)\.cpu_some_pressure_stall_time\.time'
  match_type: regex
  name: truenas_cgroup_cpu_pressure_stall_time
  labels:
    job: truenas
    container: "${1}"
    type: "some"

# Memory
- match: 'scale\.truenas\.(cgroup_[^.]*)\.mem_usage\.(.*)'
  match_type: regex
  name: truenas_cgroup_memory
  labels:
    job: truenas
    container: "${1}"
    type: "${2}"

- match: 'scale\.truenas\.(cgroup_[^.]*)\.mem_usage_limit\.(.*)'
  match_type: regex
  name: truenas_cgroup_memory_limit
  labels:
    job: truenas
    container: "${1}"
    type: "${2}"

- match: 'scale\.truenas\.(cgroup_[^.]*)\.mem_utilization\.utilization'
  match_type: regex
  name: truenas_cgroup_memory_utilization
  labels:
    job: truenas
    container: "${1}"

- match: 'scale\.truenas\.(cgroup_[^.]*)\.mem\.(.*)'
  match_type: regex
  name: truenas_cgroup_memory_detail
  labels:
    job: truenas
    container: "${1}"
    type: "${2}"

- match: 'scale\.truenas\.(cgroup_[^.]*)\.mem_full_pressure\.(.*)'
  match_type: regex
  name: truenas_cgroup_memory_pressure
  labels:
    job: truenas
    container: "${1}"
    type: "full"
    period: "${2}"

- match: 'scale\.truenas\.(cgroup_[^.]*)\.mem_some_pressure\.(.*)'
  match_type: regex
  name: truenas_cgroup_memory_pressure
  labels:
    job: truenas
    container: "${1}"
    type: "some"
    period: "${2}"

- match: 'scale\.truenas\.(cgroup_[^.]*)\.memory_full_pressure_stall_time\.time'
  match_type: regex
  name: truenas_cgroup_memory_pressure_stall_time
  labels:
    job: truenas
    container: "${1}"
    type: "full"

- match: 'scale\.truenas\.(cgroup_[^.]*)\.memory_some_pressure_stall_time\.time'
  match_type: regex
  name: truenas_cgroup_memory_pressure_stall_time
  labels:
    job: truenas
    container: "${1}"
    type: "some"

# I/O
- match: 'scale\.truenas\.(cgroup_[^.]*)\.io\.(.*)'
  match_type: regex
  name: truenas_cgroup_io
  labels:
    job: truenas
    container: "${1}"
    direction: "${2}"

- match: 'scale\.truenas\.(cgroup_[^.]*)\.serviced_ops\.(.*)'
  match_type: regex
  name: truenas_cgroup_io_ops
  labels:
    job: truenas
    container: "${1}"
    direction: "${2}"

- match: 'scale\.truenas\.(cgroup_[^.]*)\.writeback\.(.*)'
  match_type: regex
  name: truenas_cgroup_writeback
  labels:
    job: truenas
    container: "${1}"
    type: "${2}"

- match: 'scale\.truenas\.(cgroup_[^.]*)\.pgfaults\.(.*)'
